<!DOCTYPE html>
<html>
<head>
    <title>Test Google Picker Absensi</title>
</head>
<body>

    <button id="auth_button" onclick="handleAuthClick()">Pilih / Upload Dokumentasi</button>
    <p id="file_info"></p>

    <script async defer src="https://apis.google.com/js/api.js" onload="onApiLoad()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="onGsiLoad()"></script>

    <script>
        // 1. MASUKKAN KREDENSIAL ANDA DI SINI
        const DeveloperKey = 'AIzaSyAuv-eBywmdzW8BhX5aR596WF-s7-WKQlg';
        const ClientId = '218024071495-41ea5tb0p004h3u6sp6hv2t9tmq3paad.apps.googleusercontent.com';
        
        // Scope yang dibutuhkan untuk melihat dan mengupload file ke Drive
        const Scopes = 'https://www.googleapis.com/auth/drive.file';

        let accessToken = null;
        let pickerInited = false;
        let gapiInited = false;

        function onApiLoad() { gapi.load('picker', () => { gapiInited = true; }); }
        function onGsiLoad() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: ClientId,
                scope: Scopes,
                callback: '', // didefinisikan dinamis saat tombol diklik
            });
            pickerInited = true;
        }

        function handleAuthClick() {
            tokenClient.callback = async (response) => {
                if (response.error !== undefined) { throw response; }
                accessToken = response.access_token;
                createPicker();
            };

            if (accessToken === null) {
                // Minta pengguna login ke Google terlebih dahulu
                tokenClient.requestAccessToken({prompt: 'consent'});
            } else {
                createPicker();
            }
        }

        // 2. FUNGSI UNTUK MEMBUAT JENDELA POP-UP PICKER
        function createPicker() {
            if (pickerInited && gapiInited) {
                const view = new google.picker.View(google.picker.ViewId.DOCS);
                
                const picker = new google.picker.PickerBuilder()
                    .addView(view)
                    .addView(new google.picker.DocsUploadView()) // Menambahkan tab UPLOAD di jendela
                    .setOAuthToken(accessToken)
                    .setDeveloperKey(DeveloperKey)
                    .setCallback(pickerCallback)
                    .build();
                
                picker.setVisible(true);
            }
        }

        // 3. FUNGSI SETELAH PENGGUNA SELESAI MEMILIH/MENGUPLOAD FILE
        function pickerCallback(data) {
            if (data[google.picker.Response.ACTION] == google.picker.Action.PICKED) {
                const doc = data[google.picker.Response.DOCUMENTS][0];
                const fileId = doc[google.picker.Document.ID];
                const fileUrl = doc[google.picker.Document.URL];
                const fileName = doc[google.picker.Document.NAME];

                // Menampilkan hasil ke halaman web
                document.getElementById('file_info').innerHTML = 
                    `File Berhasil Dipilih: <b>${fileName}</b><br><a href="${fileUrl}" target="_blank">Lihat Dokumentasi</a>`;
                
                // TIPS: Anda bisa menyimpan 'fileUrl' atau 'fileId' ke database absensi Anda nanti.
            }
        }
    </script>
</body>
</html>
